services:
  recorder-server:
    image: rust-voice-recorder:latest
    build:
      context: ./server
    container_name: recorder-server
    environment:
      RUST_LOG: info
      APP_DATA_DIR: /data
      APP_DB_PATH: /data/app.db
      APP_MAX_CHUNK_BYTES: 10485760
      APP_WEB_DIR: /app/web
    volumes:
      - ./data:/data
      - ./web:/app/web:ro
    ports:
      - "8080:3000"
    restart: unless-stopped
